version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: electrasim_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: electrasim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: electrasim_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/electrasim
      - SECRET_KEY=super_secret_production_key_4758392019
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend/static:/workspace/static

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: electrasim_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
